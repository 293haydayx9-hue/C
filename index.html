<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>หน้าแสดงคิวลูกค้า</title>
    <style>
        /* คุณสามารถเขียน CSS แต่ง UI สวยๆ ได้ตามต้องการ */
        body { font-family: sans-serif; text-align: center; padding: 50px; }
        .queue-box { border: 2px solid #ccc; padding: 20px; border-radius: 10px; max-width: 300px; margin: auto; }
        progress { width: 100%; height: 20px; }
    </style>
</head>
<body>

    <div class="queue-box">
        <h2>คิวปัจจุบัน</h2>
        <h1 id="currentQueue">กำลังโหลด...</h1>
        <p>คิวที่รอ: <span id="waitingQueue">-</span> คิว</p>
        
        <p>ความคืบหน้างานปัจจุบัน</p>
        <progress id="progressBar" value="0" max="100"></progress>
        <p><span id="progressText">0</span>%</p>
    </div>

    <script>
        // ใส่ URL ที่ได้จาก Google Apps Script ในขั้นที่ 1
        const API_URL = 'ใส่_URL_WEB_APP_ของคุณที่นี่';

        async function fetchQueue() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                document.getElementById('currentQueue').innerText = data.currentQueue;
                document.getElementById('waitingQueue').innerText = data.waitingQueue;
                document.getElementById('progressBar').value = data.progress;
                document.getElementById('progressText').innerText = data.progress;
            } catch (error) {
                console.error('ไม่สามารถดึงข้อมูลได้:', error);
            }
        }

        // ให้ดึงข้อมูลทันที และรีเฟรชใหม่ทุกๆ 30 วินาที
        fetchQueue();
        setInterval(fetchQueue, 30000); 
    </script>
</body>
</html>
